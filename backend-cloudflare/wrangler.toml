name = "nopad"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "RoomDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["RoomDurableObject"]

[[r2_buckets]]
binding = "FILES"
bucket_name = "nopad-files"

[vars]
ENVIRONMENT = "production"
